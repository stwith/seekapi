# Controlled task PR auto-merge [AC2]
name: Auto Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, unlabeled, ready_for_review, converted_to_draft]
  pull_request_review_thread:
    types: [resolved]
  issue_comment:
    types: [created, edited]
  workflow_run:
    workflows: ["CI", "PR Review Comment"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: read
  checks: read
  actions: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_target' ||
      github.event_name == 'pull_request_review_thread' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.event == 'pull_request')

    steps:
      - name: Merge labeled PR when the full review loop is green
        uses: actions/github-script@v7
        with:
          script: |
            async function getPullRequests() {
              if (context.eventName === "pull_request_target") {
                return [context.payload.pull_request];
              }

              if (context.eventName === "issue_comment") {
                return [{ number: context.payload.issue.number }];
              }

              if (context.eventName === "pull_request_review_thread") {
                return [context.payload.pull_request];
              }

              return context.payload.workflow_run.pull_requests ?? [];
            }

            async function listCheckRuns(owner, repo, ref) {
              const response = await github.rest.checks.listForRef({
                owner,
                repo,
                ref,
                per_page: 100,
              });

              return response.data.check_runs;
            }

            async function latestCodexReviewStatus(owner, repo, issueNumber) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              const matches = comments
                .filter((comment) => comment.body?.includes("<!-- seekapi-codex-review -->"))
                .sort((a, b) => Date.parse(b.created_at) - Date.parse(a.created_at));

              const latest = matches[0];
              if (!latest) return "missing";

              const match = latest.body.match(/STATUS:\s*(READY|BLOCKED)/);
              return match?.[1] ?? "unknown";
            }

            async function unresolvedReviewThreadCount(owner, repo, pullNumber) {
              const query = `
                query($owner: String!, $repo: String!, $pullNumber: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $pullNumber) {
                      reviewThreads(first: 100) {
                        nodes {
                          isResolved
                        }
                      }
                    }
                  }
                }
              `;

              const result = await github.graphql(query, {
                owner,
                repo,
                pullNumber,
              });

              const nodes = result.repository.pullRequest.reviewThreads.nodes ?? [];
              return nodes.filter((thread) => !thread.isResolved).length;
            }

            function conclusionFor(runs, name) {
              const namedRuns = runs.filter((run) => run.name === name);
              if (namedRuns.length === 0) return "missing";
              if (namedRuns.some((run) => run.status !== "completed")) return "pending";
              if (namedRuns.some((run) => run.conclusion !== "success")) return "failed";
              return "success";
            }

            function normalizedMergeState(pr) {
              if (typeof pr.mergeStateStatus === "string") {
                return pr.mergeStateStatus;
              }

              if (typeof pr.mergeable_state === "string") {
                return pr.mergeable_state.toUpperCase();
              }

              return "UNKNOWN";
            }

            const requiredChecks = ["validate", "comment"];
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pulls = await getPullRequests();

            for (const pull of pulls) {
              const current = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pull.number,
              });

              const pr = current.data;
              const labels = new Set(pr.labels.map((label) => label.name));
              const mergeState = normalizedMergeState(pr);

              if (pr.state !== "open") continue;
              if (pr.base.ref !== "main") continue;
              if (pr.draft) continue;
              if (!labels.has("automerge")) continue;
              if (mergeState !== "CLEAN") {
                core.info(`PR #${pr.number} not mergeable yet: mergeStateStatus=${mergeState}`);
                continue;
              }

              const checkRuns = await listCheckRuns(owner, repo, pr.head.sha);
              const statuses = Object.fromEntries(
                requiredChecks.map((name) => [name, conclusionFor(checkRuns, name)]),
              );
              const codexReviewStatus = await latestCodexReviewStatus(owner, repo, pr.number);
              const unresolvedThreads = await unresolvedReviewThreadCount(owner, repo, pr.number);

              const allGreen = requiredChecks.every((name) => statuses[name] === "success");
              if (!allGreen || codexReviewStatus !== "READY" || unresolvedThreads > 0) {
                core.info(
                  `PR #${pr.number} not ready for auto-merge: ` +
                  JSON.stringify({ statuses, codexReviewStatus, unresolvedThreads }),
                );
                continue;
              }

              const mergeResponse = await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pr.number,
                merge_method: "squash",
              });

              if (!mergeResponse.data.merged) {
                core.info(
                  `PR #${pr.number} merge was not completed: ` +
                  `${mergeResponse.data.message ?? "no message returned"}`,
                );
                continue;
              }

              if (pr.head.repo.full_name === `${owner}/${repo}`) {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${pr.head.ref}`,
                });
              }

              core.info(`Auto-merged PR #${pr.number}`);
            }
