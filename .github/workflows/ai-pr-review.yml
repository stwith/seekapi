name: AI PR Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate or update Codex review guidance comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- seekapi-ai-review -->";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull = context.payload.pull_request;

            async function upsertComment(body) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pull.number,
                per_page: 100,
              });

              const existing = comments.find((comment) =>
                comment.user?.type === "Bot" && comment.body?.includes(marker),
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull.number,
                body,
              });
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pull.number,
              per_page: 100,
            });

            const codexReviews = comments
              .filter((comment) => comment.body?.includes("<!-- seekapi-codex-review -->"))
              .sort((a, b) => Date.parse(b.created_at) - Date.parse(a.created_at));

            const latestCodexReview = codexReviews[0];
            const latestStatus = latestCodexReview?.body?.match(/STATUS:\s*(READY|BLOCKED)/)?.[1] ?? "NOT_FOUND";
            const latestPreview = latestCodexReview?.body
              ?.split("\n")
              .slice(0, 8)
              .join("\n");

            await upsertComment([
              marker,
              "## SeekAPI AI Review",
              "",
              "This repository uses Codex GitHub review, not a repository `OPENAI_API_KEY` secret. [AC3][AC4][AC5]",
              "",
              "### Trigger Review",
              "1. Open the pull request in GitHub.",
              "2. Ask for review with `@codex review`, or enable Codex auto-review in the repository's GitHub/Codex settings.",
              "3. Keep the structured Codex review comment updated with `<!-- seekapi-codex-review -->` and `STATUS: READY` or `STATUS: BLOCKED`.",
              "",
              `Latest structured Codex review status: \`${latestStatus}\``,
              latestPreview
                ? ["", "### Latest Structured Review Preview", "```text", latestPreview.slice(0, 3000), "```"].join("\n")
                : "",
              "",
              "Auto-merge still waits for the latest structured Codex review to report `STATUS: READY`.",
              `[Open PR](https://github.com/${owner}/${repo}/pull/${pull.number})`,
            ].filter(Boolean).join("\n"));
